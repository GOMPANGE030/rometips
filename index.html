<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Rometips</title>
  
  <link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#2b241c" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Rometips" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f1ea;
      color: #2b241c;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 24px 18px;
      box-sizing: border-box;
    }

    .title {
      font-size: 30px;
      font-weight: 800;
      margin: 12px 0 6px;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 15px;
      color: #6d6256;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .search-box {
  margin-bottom: 16px;
}

.search-box input {
  width: 100%;
  box-sizing: border-box;
  border: 0;
  outline: none;
  padding: 16px 18px;
  border-radius: 16px;
  background: #ffffff;
  color: #2b241c;
  font-size: 16px;
  font-family: inherit;
  box-shadow: 0 6px 16px rgba(45, 35, 25, 0.08);
}

.search-box input::placeholder {
  color: #9a8f84;
}

.search-count {
  margin: 0 0 12px;
  font-size: 14px;
  font-weight: 800;
  color: #6d6256;
}
    
    .category-list {
      display: grid;
      gap: 14px;
    }

    .card {
      border: 0;
      width: 100%;
      text-align: left;
      padding: 18px;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 6px 16px rgba(45, 35, 25, 0.08);
      cursor: pointer;
      color: inherit;
      font-family: inherit;
    }

    .card:active {
      transform: scale(0.98);
    }

    .card-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 14px;
      color: #6d6256;
      line-height: 1.45;
    }

    .ready,
    .empty-box {
      margin-top: 24px;
      padding: 14px;
      border-radius: 14px;
      background: #fff7d6;
      font-size: 14px;
      line-height: 1.5;
    }

    .back-button {
      border: 0;
      background: #2b241c;
      color: #ffffff;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 18px;
      cursor: pointer;
    }

    .detail-header {
      margin-bottom: 20px;
    }

    .detail-icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      box-shadow: 0 6px 16px rgba(45, 35, 25, 0.08);
      margin-bottom: 14px;
    }

    .summary {
      background: #ffffff;
      border-radius: 16px;
      padding: 16px;
      line-height: 1.6;
      color: #3d3328;
      box-shadow: 0 6px 16px rgba(45, 35, 25, 0.06);
    }

    .detail-content {
      display: grid;
      gap: 16px;
    }

    .info-section {
      background: #ffffff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 6px 16px rgba(45, 35, 25, 0.06);
    }

    .info-section h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .rank-list {
      display: grid;
      gap: 10px;
    }

    .rank-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-radius: 14px;
      background: #f7f3ec;
    }

    .rank-badge {
      flex: 0 0 auto;
      background: #2b241c;
      color: #ffffff;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 13px;
      font-weight: 700;
    }

    .rank-name {
      font-size: 17px;
      font-weight: 800;
    }

    .explain-list {
      display: grid;
      gap: 12px;
    }

    .explain-item {
      padding: 14px;
      border-radius: 14px;
      background: #f7f3ec;
    }

    .explain-item strong {
      display: block;
      font-size: 17px;
      margin-bottom: 6px;
    }

    .explain-item p {
      margin: 0;
      color: #5d5146;
      line-height: 1.55;
      font-size: 14px;
    }

    .tip-box {
      margin-top: 18px;
      padding: 18px;
      border-radius: 18px;
      background: #e8f3dc;
      box-shadow: 0 6px 16px rgba(45, 35, 25, 0.06);
    }

    .tip-title {
      font-weight: 900;
      margin-bottom: 8px;
      font-size: 17px;
    }

    .tip-text {
      line-height: 1.6;
      color: #37412f;
    }
  </style>
</head>

<body>
  <main class="app">
    <h1 class="title">Rometips</h1>
    <p class="subtitle">
      롬스테드 게임 팁을 모아두는 개인용 공략 노트입니다.
    </p>

    <div class="ready">
      앱을 불러오는 중입니다.
    </div>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
