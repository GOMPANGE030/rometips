<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Rometips</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="rometips_icon.png" />
  <link rel="icon" type="image/png" href="rometips_icon.png" />
  <meta name="theme-color" content="#2b241c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Rometips" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f1ea;
      color: #2b241c;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 24px 18px;
      box-sizing: border-box;
    }

    .title {
      font-size: 30px;
      font-weight: 800;
      margin: 12px 0 6px;
      line-height: 1.2;
    }

    .logo-image {
      display: block;
      width: 190px;
      max-width: 70%;
      height: auto;
      margin: 8px 0 14px;
    }
    
    .logo-fallback {
      font-size: 30px;
      font-weight: 800;
      margin: 12px 0 6px;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 15px;
      color: #6d6256;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .search-box {
      margin-bottom: 16px;
    }

    .search-box input {
      width: 100%;
      box-sizing: border-box;
      border: 0;
      outline: none;
      padding: 16px 18px;
      border-radius: 16px;
      background: #ffffff;
      color: #2b241c;
      font-size: 16px;
      font-family: inherit;
      box-shadow: 0 6px 16px rgba(45, 35, 25, 0.08);
    }

    .search-box input::placeholder {
      color: #9a8f84;
    }

    .search-count {
      margin: 0 0 12px;
      font-size: 14px;
      font-weight: 800;
      color: #6d6256;
    }

    .count-box {
      margin: -8px 0 18px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #ffffff;
      color: #6d6256;
      font-size: 14px;
      font-weight: 800;
      box-shadow: 0 6px 16px rgba(45, 35, 25, 0.06);
    }

    .trait-recommender {
      margin: 0 0 18px;
      padding: 16px;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 6px 16px rgba(45, 35, 25, 0.08);
    }

    .trait-recommender-title {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .trait-recommender-desc {
      margin: 0 0 14px;
      color: #6d6256;
      font-size: 14px;
      line-height: 1.5;
    }

    .trait-filter-group {
      margin-top: 14px;
    }

    .trait-filter-label {
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 8px;
      color: #3d3328;
    }

    .trait-filter-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .trait-filter-button {
      border: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 11px;
      border-radius: 999px;
      background: #f7f3ec;
      color: #2b241c;
      font-family: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .trait-filter-button:active {
      transform: scale(0.97);
    }

    .positive-filter-button.is-selected {
      background: #dff1d8;
      color: #315f2b;
      box-shadow: inset 0 0 0 2px #81b875;
    }

    .negative-filter-button.is-selected {
      background: #f8dddd;
      color: #783131;
      box-shadow: inset 0 0 0 2px #d08b8b;
    }

    .filter-icon {
      width: 22px;
      height: 22px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .recommend-result-box {
      margin-top: 14px;
      padding: 12px 13px;
      border-radius: 14px;
      background: #fff7d6;
      color: #4a3b16;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.5;
    }

    .filter-reset-button {
      margin-top: 10px;
      border: 0;
      padding: 9px 12px;
      border-radius: 999px;
      background: #2b241c;
      color: #ffffff;
      font-size: 13px;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
    }

    .category-list {
      display: grid;
      gap: 14px;
    }

    .card {
      border: 0;
      width: 100%;
      text-align: left;
      padding: 18px;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 6px 16px rgba(45, 35, 25, 0.08);
      cursor: pointer;
      color: inherit;
      font-family: inherit;
    }

    .card:active {
      transform: scale(0.98);
    }

    .recommended-card {
      background: #fff8d9;
      border: 2px solid #f0d469;
      box-shadow: 0 8px 20px rgba(143, 113, 20, 0.16);
    }

    .recommend-reason {
      margin-top: 10px;
      display: inline-block;
      padding: 7px 10px;
      border-radius: 999px;
      background: #f4dc71;
      color: #4d3b00;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.35;
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 14px;
      color: #6d6256;
      line-height: 1.45;
    }

    .ready,
    .empty-box {
      margin-top: 24px;
      padding: 14px;
      border-radius: 14px;
      background: #fff7d6;
      font-size: 14px;
      line-height: 1.5;
    }

    .back-button {
      border: 0;
      background: #2b241c;
      color: #ffffff;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 18px;
      cursor: pointer;
      font-family: inherit;
    }

    .detail-header {
      margin-bottom: 20px;
    }

    .detail-icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      box-shadow: 0 6px 16px rgba(45, 35, 25, 0.08);
      margin-bottom: 14px;
      overflow: hidden;
    }

    .summary {
      background: #ffffff;
      border-radius: 16px;
      padding: 16px;
      line-height: 1.6;
      color: #3d3328;
      box-shadow: 0 6px 16px rgba(45, 35, 25, 0.06);
    }

    .detail-content {
      display: grid;
      gap: 16px;
    }

    .info-section {
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 6px 16px rgba(45, 35, 25, 0.06);
    }

    .info-section h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .neutral-section {
      background: #ffffff;
    }

    .positive-section {
      background: #eaf7e8;
      border: 1px solid #d5ebcf;
    }

    .positive-section h2 {
      color: #315f2b;
    }

    .negative-section {
      background: #fdeaea;
      border: 1px solid #f2cdcd;
    }

    .negative-section h2 {
      color: #783131;
    }

    .rank-list {
      display: grid;
      gap: 10px;
    }

    .rank-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-radius: 14px;
    }

    .neutral-item {
      background: #f7f3ec;
    }

    .positive-item {
      background: #f6fcf4;
    }

    .negative-item {
      background: #fff7f7;
    }

    .rank-badge {
      flex: 0 0 auto;
      background: #2b241c;
      color: #ffffff;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 13px;
      font-weight: 700;
    }

    .positive-badge {
      background: #3f7b37;
    }

    .negative-badge {
      background: #9b3e3e;
    }

    .rank-name {
      font-size: 17px;
      font-weight: 800;
    }

    .explain-list {
      display: grid;
      gap: 12px;
    }

    .explain-item {
      padding: 14px;
      border-radius: 14px;
    }

    .explain-title {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 6px;
    }

    .explain-item strong {
      display: block;
      font-size: 17px;
    }

    .explain-item p {
      margin: 0;
      color: #5d5146;
      line-height: 1.55;
      font-size: 14px;
    }

    .tip-box {
      margin-top: 18px;
      padding: 18px;
      border-radius: 18px;
      background: #e8f3dc;
      box-shadow: 0 6px 16px rgba(45, 35, 25, 0.06);
    }

    .tip-title {
      font-weight: 900;
      margin-bottom: 8px;
      font-size: 17px;
    }

    .tip-text {
      line-height: 1.6;
      color: #37412f;
    }

    .inline-icon {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      object-fit: contain;
      vertical-align: middle;
      flex: 0 0 auto;
    }

    .title-icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      object-fit: contain;
      vertical-align: middle;
      margin-right: 6px;
    }

    .trait-icon {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .detail-image-icon {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      object-fit: contain;
    }

    .emoji-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body>
  <main class="app">
    <h1 class="title">Rometips</h1>
    <p class="subtitle">
      롬스테드 게임 팁을 모아두는 개인용 공략 노트입니다.
    </p>

    <div class="ready">
      앱을 불러오는 중입니다.
    </div>
  </main>

  <script src="data.js?v=12"></script>
  <script src="app.js?v=12"></script>
</body>
</html>
