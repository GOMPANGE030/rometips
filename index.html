<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Rometips</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f1ea;
      color: #2b241c;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 24px 18px;
      box-sizing: border-box;
    }

    .title {
      font-size: 30px;
      font-weight: 800;
      margin: 12px 0 6px;
    }

    .subtitle {
      font-size: 15px;
      color: #6d6256;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .category-list {
      display: grid;
      gap: 14px;
    }

    .card {
      border: 0;
      width: 100%;
      text-align: left;
      padding: 18px;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 6px 16px rgba(45, 35, 25, 0.08);
      cursor: pointer;
    }

    .card-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 14px;
      color: #6d6256;
      line-height: 1.45;
    }

    .ready {
      margin-top: 24px;
      padding: 14px;
      border-radius: 14px;
      background: #fff7d6;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <main class="app">
    <h1 class="title">Rometips</h1>
    <p class="subtitle">
      롬스테드 게임 팁을 모아두는 개인용 공략 노트입니다.
    </p>

    <section class="category-list">
      <button class="card">
        <div class="card-title">🧑‍🌾 직업특성표</div>
        <div class="card-desc">직업별 긍정특성, 피해야 할 부정특성, 배치 기준 정리</div>
      </button>

      <button class="card">
        <div class="card-title">⚔️ 무기수식어</div>
        <div class="card-desc">무기에 붙는 수식어 효과와 추천 사용처 정리</div>
      </button>

      <button class="card">
        <div class="card-title">🏠 건물/배치팁</div>
        <div class="card-desc">마을 운영과 건물 배치 관련 팁 정리</div>
      </button>

      <button class="card">
        <div class="card-title">📌 기타팁</div>
        <div class="card-desc">나중에 추가할 여러 공략 메모</div>
      </button>
    </section>

    <div class="ready">
      지금은 첫 화면 테스트 단계입니다.  
      다음 단계에서 직업특성표를 누르면 직업 목록으로 이동하게 만들 예정입니다.
    </div>
  </main>
</body>
</html>
